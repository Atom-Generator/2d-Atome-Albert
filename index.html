<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>2D-Atomgenerator – bis Argon V3g</title>
<style>
body{margin:0;background:#f7f7f7}
.atomgen{font-family:Arial,sans-serif;max-width:980px;margin:20px auto;padding:18px;border:1px solid #bbb;border-radius:14px;background:#fff}
.atomgen h2{margin-top:0;font-size:23px}
.row{margin:8px 0}
label{display:inline-block;width:170px}
input,select{width:145px;padding:5px}
button{margin:10px 8px 10px 0;padding:8px 14px;cursor:pointer}
#atomCanvas{display:block;margin:18px auto 10px auto;background:white;border:1px solid #ddd;max-width:100%}
#atomInfo{margin-top:12px;font-size:14px;line-height:1.55}
.note{font-size:13px;color:#555;line-height:1.45}
</style>
</head>
<body>
<div class="atomgen">
<h2>2D-Atomgenerator – Bauplan bis Argon V3g</h2>

<div class="row"><label>Element:</label><select id="elementSelect" onchange="syncElement()"></select></div>
<div class="row"><label>Protonen P:</label><input id="protonCount" type="number" min="1" max="18" value="8" onchange="syncFromProtons()"></div>
<div class="row"><label>Neutronen N:</label><input id="neutronCount" type="number" min="0" max="18" value="8"></div>

<button onclick="generateAtom()">Atom erzeugen</button>
<button onclick="downloadPNG()">PNG herunterladen</button>

<canvas id="atomCanvas" width="980" height="680"></canvas>
<div id="atomInfo"></div>
<p class="note">Modulare Version V3g bis Ar-36. Neu: Wertigkeiten werden automatisch erkannt; bei zu wenigen Neutronen erscheint „kein Isotop möglich“.</p>
</div>

<script>
let lastCanvasReady=false;
const ELEMENTS={"1": ["H", "Wasserstoff", 0], "2": ["He", "Helium", 2], "3": ["Li", "Lithium", 4], "4": ["Be", "Beryllium", 5], "5": ["B", "Bor", 6], "6": ["C", "Kohlenstoff", 6], "7": ["N", "Stickstoff", 7], "8": ["O", "Sauerstoff", 8], "9": ["F", "Fluor", 10], "10": ["Ne", "Neon", 10], "11": ["Na", "Natrium", 12], "12": ["Mg", "Magnesium", 12], "13": ["Al", "Aluminium", 14], "14": ["Si", "Silicium", 14], "15": ["P", "Phosphor", 16], "16": ["S", "Schwefel", 16], "17": ["Cl", "Chlor", 18], "18": ["Ar", "Argon", 18]};
const BUILD_PHASES=[{"id":"H_HE","name":"Helium-Phase","zMin":1,"zMax":2,"rows":2,"cols":2,"description":"H bis He / 2×2"},{"id":"LI_NE","name":"Neon-Phase","zMin":3,"zMax":10,"rows":5,"cols":4,"description":"Li bis Ne / 4×5"},{"id":"NA_AR","name":"Argon-Phase","zMin":11,"zMax":18,"rows":6,"cols":6,"description":"Na bis Ar / 6×6"},{"id":"MG_AL_5x6","name":"Magnesium-Aluminium 5×6","zMin":12,"zMax":13,"rows":5,"cols":6,"description":"Mg-24 und Al-27 / 5×6"}];
const BASE_TEMPLATES={"1":{"phase":"H_HE","title":"H-1","P":[[0,1]],"N":[],"V":[[1,1]]},"2":{"phase":"H_HE","title":"He-4","P":[[1,0],[0,1]],"N":[[0,0],[1,1]],"V":[]},"3":{"phase":"LI_NE","title":"Li-7","P":[[2,0],[1,1],[2,2]],"N":[[1,0],[0,1],[2,1],[1,2]],"V":[[0,0],[0,2]]},"4":{"phase":"LI_NE","title":"Be-9","P":[[2,0],[1,1],[3,1],[2,2]],"N":[[1,0],[0,1],[2,1],[1,2],[3,2]],"V":[[0,0],[3,0],[0,2]]},"5":{"phase":"LI_NE","title":"B-11","P":[[2,1],[1,2],[3,2],[0,3],[2,3]],"N":[[2,0],[1,1],[3,1],[0,2],[2,2],[1,3]],"V":[[1,0],[3,0],[0,1],[3,3]]},"6":{"phase":"LI_NE","title":"C-12","P":[[2,1],[1,2],[3,2],[0,3],[2,3],[1,4]],"N":[[2,0],[1,1],[3,1],[0,2],[2,2],[1,3]],"V":[[1,0],[3,0],[0,1],[3,3],[0,4],[2,4]]},"7":{"phase":"LI_NE","title":"N-14","P":[[0,1],[2,1],[1,2],[3,2],[0,3],[2,3],[1,4]],"N":[[2,0],[1,1],[3,1],[0,2],[2,2],[1,3],[3,3]],"V":[[1,0],[3,0],[0,4],[2,4]]},"8":{"phase":"LI_NE","title":"O-16","P":[[1,0],[0,1],[2,1],[1,2],[3,2],[0,3],[2,3],[1,4]],"N":[[2,0],[1,1],[3,1],[0,2],[2,2],[1,3],[3,3],[2,4]],"V":[[0,0],[3,0],[0,4],[3,4]]},"9":{"phase":"LI_NE","title":"F-19","P":[[1,0],[0,1],[2,1],[1,2],[3,2],[0,3],[2,3],[1,4],[3,4]],"N":[[0,0],[2,0],[1,1],[3,1],[0,2],[2,2],[1,3],[3,3],[0,4],[2,4]],"V":[[3,0]]},"10":{"phase":"LI_NE","title":"Ne-20","P":[[1,0],[3,0],[0,1],[2,1],[1,2],[3,2],[0,3],[2,3],[1,4],[3,4]],"N":[[0,0],[2,0],[1,1],[3,1],[0,2],[2,2],[1,3],[3,3],[0,4],[2,4]],"V":[]},"11":{"phase":"NA_AR","title":"Na-23","P":[[1,0],[3,0],[0,1],[2,1],[4,1],[1,2],[3,2],[0,3],[2,3],[1,4],[3,4]],"N":[[0,0],[2,0],[1,1],[3,1],[0,2],[2,2],[4,2],[1,3],[3,3],[0,4],[2,4],[4,4]],"V":[[4,0],[4,3]]},"12":{"phase":"MG_AL_5x6","title":"Mg-24","P":[[2,0],[4,0],[1,1],[3,1],[5,1],[0,2],[2,2],[4,2],[1,3],[3,3],[2,4],[4,4]],"N":[[1,0],[3,0],[0,1],[2,1],[4,1],[1,2],[3,2],[5,2],[2,3],[4,3],[1,4],[3,4]],"V":[[0,0],[5,0],[0,3],[5,3]]},"13":{"phase":"MG_AL_5x6","title":"Al-27","P":[[2,0],[4,0],[1,1],[3,1],[5,1],[0,2],[2,2],[4,2],[1,3],[3,3],[5,3],[2,4],[4,4]],"N":[[1,0],[3,0],[5,0],[0,1],[2,1],[4,1],[1,2],[3,2],[5,2],[0,3],[2,3],[4,3],[1,4],[3,4]],"V":[[0,0],[0,4],[5,4]]},"14":{"phase":"NA_AR","title":"Si-28","P":[[1,0],[3,0],[0,1],[2,1],[4,1],[1,2],[3,2],[2,3],[4,3],[1,4],[3,4],[5,4],[2,5],[4,5]],"N":[[2,0],[4,0],[1,1],[3,1],[5,1],[2,2],[4,2],[1,3],[3,3],[0,4],[2,4],[4,4],[1,5],[3,5]],"V":[[0,0],[5,0],[0,2],[5,2],[0,3],[5,3],[0,5],[5,5]]},"15":{"phase":"NA_AR","title":"P-31","P":[[1,0],[3,0],[0,1],[2,1],[4,1],[1,2],[3,2],[5,2],[2,3],[4,3],[1,4],[3,4],[5,4],[2,5],[4,5]],"N":[[2,0],[4,0],[1,1],[3,1],[5,1],[0,2],[2,2],[4,2],[1,3],[3,3],[5,3],[0,4],[2,4],[4,4],[1,5],[3,5]],"V":[[0,0],[5,0],[0,3],[0,5],[5,5]]},"16":{"phase":"NA_AR","title":"S-32","P":[[1,0],[3,0],[0,1],[2,1],[4,1],[1,2],[3,2],[5,2],[0,3],[2,3],[4,3],[1,4],[3,4],[5,4],[2,5],[4,5]],"N":[[2,0],[4,0],[1,1],[3,1],[5,1],[0,2],[2,2],[4,2],[1,3],[3,3],[5,3],[0,4],[2,4],[4,4],[1,5],[3,5]],"V":[[0,0],[5,0],[0,5],[5,5]]},"17":{"phase":"NA_AR","title":"Cl-35","P":[[1,0],[3,0],[0,1],[2,1],[4,1],[1,2],[3,2],[5,2],[0,3],[2,3],[4,3],[1,4],[3,4],[5,4],[0,5],[2,5],[4,5]],"N":[[0,0],[2,0],[4,0],[1,1],[3,1],[5,1],[0,2],[2,2],[4,2],[1,3],[3,3],[5,3],[0,4],[2,4],[4,4],[1,5],[3,5],[5,5]],"V":[[5,0]]},"18":{"phase":"NA_AR","title":"Ar-36","P":[[1,0],[3,0],[5,0],[0,1],[2,1],[4,1],[1,2],[3,2],[5,2],[0,3],[2,3],[4,3],[1,4],[3,4],[5,4],[0,5],[2,5],[4,5]],"N":[[0,0],[2,0],[4,0],[1,1],[3,1],[5,1],[0,2],[2,2],[4,2],[1,3],[3,3],[5,3],[0,4],[2,4],[4,4],[1,5],[3,5],[5,5]],"V":[]}};

/*
SPÄTER ERWEITERN:
BUILD_PHASES.push({
  id:"AR_KR",
  name:"Krypton-Phase",
  zMin:19,
  zMax:36,
  rows:7,
  cols:12,
  description:"Ar bis Kr / 7×12"
});
Danach BASE_TEMPLATES[19] bis BASE_TEMPLATES[36] ergänzen.
*/

function fieldType(x,y){ return ((x+y)%2===0) ? "N" : "P"; }

function fieldTypePhase(x,y,phase){
  /*
    Normalfall:
    gerade Felder = N, ungerade Felder = P.

    Mg-24 und Al-27 sind laut Referenzbildern um eine Schachbrettphase
    verschoben:
    gerade Felder = P, ungerade Felder = N.
  */
  if(phase && phase.id==="MG_AL_5x6"){
    return ((x+y)%2===0) ? "P" : "N";
  }
  return fieldType(x,y);
}
function keyXY(x,y){return x+","+y;}
function key(p){return p.x+","+p.y;}
function phaseById(id){return BUILD_PHASES.find(p=>p.id===id);}

function allNFields(phase){
  const out=[];
  for(let y=0;y<phase.rows;y++)for(let x=0;x<phase.cols;x++)if(fieldTypePhase(x,y,phase)==="N")out.push([x,y]);
  return out;
}
function centerDistance(p,phase){
  const cx=(phase.cols-1)/2, cy=(phase.rows-1)/2;
  return Math.abs(p[0]-cx)+Math.abs(p[1]-cy);
}
function sortInsideOut(list,phase){
  return list.slice().sort((a,b)=>centerDistance(a,phase)-centerDistance(b,phase) || a[1]-b[1] || a[0]-b[0]);
}
function neighborCount(pos,set){
  const x=pos[0], y=pos[1];
  let c=0;
  if(set.has(keyXY(x+1,y)))c++;
  if(set.has(keyXY(x-1,y)))c++;
  if(set.has(keyXY(x,y+1)))c++;
  if(set.has(keyXY(x,y-1)))c++;
  return c;
}

function occupiedSetFromLists(pList,nList){
  const s=new Set();
  for(const p of pList)s.add(keyXY(p[0],p[1]));
  for(const n of nList)s.add(keyXY(n[0],n[1]));
  return s;
}

function areParticlesConnected(pList,nList){
  const all=pList.concat(nList);
  if(all.length===0)return false;
  const set=occupiedSetFromLists(pList,nList);
  const start=keyXY(all[0][0],all[0][1]);
  const seen=new Set([start]);
  const stack=[all[0]];
  while(stack.length){
    const p=stack.pop();
    const ns=[[p[0]+1,p[1]],[p[0]-1,p[1]],[p[0],p[1]+1],[p[0],p[1]-1]];
    for(const q of ns){
      const k=keyXY(q[0],q[1]);
      if(set.has(k) && !seen.has(k)){
        seen.add(k);
        stack.push(q);
      }
    }
  }
  return seen.size===set.size;
}

function minNeutronsForTemplate(t,phase){
  /*
    Regel 13:
    Zu wenige Neutronen lösen die Protonen-Neutronen-Konfiguration auf.
    Deshalb wird die kleinste Neutronenzahl gesucht, bei der der Zusammenhang
    des Atoms noch erhalten bleibt.
  */
  for(let n=0;n<=t.N.length;n++){
    const test=sortInsideOut(t.N,phase).slice(0,n);
    if(areParticlesConnected(t.P,test))return n;
  }
  return t.N.length;
}

function isotopeNeutrons(t,wantedN,phase){
  const base=t.N.slice();
  const minN=minNeutronsForTemplate(t,phase);

  if(wantedN<minN){
    throw new Error("kein Isotop möglich!");
  }

  if(wantedN===base.length)return base;

  if(wantedN<base.length){
    // Neutronenreduktion: äußere Neutronen zuerst entfernen.
    // Praktisch bleiben die inneren Neutronen erhalten.
    return sortInsideOut(base,phase).slice(0,wantedN);
  }

  const used=new Set(base.map(p=>keyXY(p[0],p[1])));
  const extras=allNFields(phase).filter(p=>!used.has(keyXY(p[0],p[1])));

  // Zusätzliche Neutronen: innen nach außen.
  return base.concat(sortInsideOut(extras,phase).slice(0,wantedN-base.length));
}
function repairListToFieldType(list,type,phase,blocked){
  /*
    Schutz gegen ältere Vorlagefehler:
    Wenn eine Position aus einer Vorlage auf dem falschen Schachbrettfeld liegt,
    wird sie auf den nächstliegenden freien korrekten Feldtyp verschoben.
  */
  const out=[];
  const used=new Set(blocked || []);
  for(const p of list){
    let x=p[0], y=p[1];
    let k=keyXY(x,y);
    if(x>=0 && x<phase.cols && y>=0 && y<phase.rows && fieldTypePhase(x,y,phase)===type && !used.has(k)){
      out.push([x,y]);
      used.add(k);
      continue;
    }

    let best=null, bestScore=99999;
    for(let yy=0; yy<phase.rows; yy++){
      for(let xx=0; xx<phase.cols; xx++){
        const kk=keyXY(xx,yy);
        if(fieldTypePhase(xx,yy,phase)!==type || used.has(kk))continue;
        const score=Math.abs(xx-x)+Math.abs(yy-y)+centerDistance([xx,yy],phase)*0.01;
        if(score<bestScore){
          bestScore=score;
          best=[xx,yy];
        }
      }
    }
    if(best){
      out.push(best);
      used.add(keyXY(best[0],best[1]));
    }
  }
  return out;
}

function dynamicValencies(particles,phase){
  /*
    Regel 8:
    Jeder unbesetzte P- oder N-Platz, der von mindestens zwei Bausteinen
    direkt flankiert wird, ist eine Wertigkeit.
  */
  const occ=new Set(particles.map(key));
  const vals=[];
  for(let y=0;y<phase.rows;y++){
    for(let x=0;x<phase.cols;x++){
      const k=keyXY(x,y);
      if(occ.has(k))continue;
      if(neighborCount([x,y],occ)>=2){
        vals.push([x,y]);
      }
    }
  }
  return vals;
}

function validateParticles(particles,phase){
  const seen=new Set();
  for(const p of particles){
    if(p.x<0||p.x>=phase.cols||p.y<0||p.y>=phase.rows)throw new Error("Baustein außerhalb des Bau-Rechtecks.");
    if(fieldTypePhase(p.x,p.y,phase)!==p.type)throw new Error("Schachbrettregel verletzt: "+p.type+" auf falschem Feld ("+p.x+","+p.y+").");
    const k=key(p); if(seen.has(k))throw new Error("Doppelte Belegung: "+k); seen.add(k);
  }
}
function buildAtom(z,n){
  const t=BASE_TEMPLATES[z]; if(!t)throw new Error("Für dieses Element ist noch kein Bauplan hinterlegt.");
  const phase=phaseById(t.phase); if(!phase)throw new Error("Bauphase nicht gefunden.");

  let pList, nList;

  // Mg-24 und Al-27: exakte Baupläne aus den Referenzbildern.
  // Diese beiden werden nicht automatisch verschoben.
  if(t.phase==="MG_AL_5x6" && n===t.N.length){
    pList=t.P.slice();
    nList=t.N.slice();
  }else{
    pList=repairListToFieldType(t.P,"P",phase,new Set());
    let neutrons=isotopeNeutrons(t,n,phase);
    let blocked=new Set(pList.map(p=>keyXY(p[0],p[1])));
    nList=repairListToFieldType(neutrons,"N",phase,blocked);
  }

  if(nList.length!==n){
    throw new Error("kein Isotop möglich!");
  }

  const particles=[];
  for(const p of pList)particles.push({x:p[0],y:p[1],type:"P"});
  for(const p of nList)particles.push({x:p[0],y:p[1],type:"N"});

  validateParticles(particles,phase);

  const template=Object.assign({},t);

  // Bei Mg/Al bleiben die Wertigkeiten aus dem Bauplan exakt erhalten.
  if(t.phase==="MG_AL_5x6"){
    template.V=t.V || [];
  }else{
    template.V=dynamicValencies(particles,phase);
  }

  return {phase:phase,template:template,particles:particles};
}
function initElements(){
  const sel=document.getElementById("elementSelect"); sel.innerHTML="";
  for(let z=1;z<=18;z++){
    const e=ELEMENTS[z]; const opt=document.createElement("option");
    opt.value=z; opt.textContent=z+" – "+e[1]+" ("+e[0]+")"; sel.appendChild(opt);
  }
  sel.value="8";
}
function syncElement(){
  const z=parseInt(document.getElementById("elementSelect").value,10);
  document.getElementById("protonCount").value=z;
  document.getElementById("neutronCount").value=ELEMENTS[z][2];
}
function syncFromProtons(){
  const z=parseInt(document.getElementById("protonCount").value,10);
  if(ELEMENTS[z]){document.getElementById("elementSelect").value=z; document.getElementById("neutronCount").value=ELEMENTS[z][2];}
}
function drawVacancy(ctx,cx,cy,r,valenceType){
  /*
    Wertigkeiten:
    - freies P-Feld = blau = Wertigkeit gegen Wasserstoff
    - freies N-Feld = rot  = Wertigkeit gegen Sauerstoff
  */
  const isHydrogenValence = valenceType === "P";
  const mainColor = isHydrogenValence ? "rgba(0,155,255,0.95)" : "rgba(255,80,80,0.95)";
  const softColor = isHydrogenValence ? "rgba(0,155,255,0.20)" : "rgba(255,80,80,0.20)";

  ctx.save();

  const grad = ctx.createRadialGradient(cx,cy,r*.05,cx,cy,r*.70);
  grad.addColorStop(0, mainColor);
  grad.addColorStop(0.45, softColor);
  grad.addColorStop(1, "rgba(255,255,255,0)");
  ctx.beginPath();
  ctx.arc(cx,cy,r*.70,0,Math.PI*2);
  ctx.fillStyle=grad;
  ctx.fill();

  ctx.beginPath();
  ctx.arc(cx,cy,r*.96,0,Math.PI*2);
  ctx.setLineDash([8,6]);
  ctx.strokeStyle="#222";
  ctx.lineWidth=2;
  ctx.stroke();

  ctx.restore();
}
function drawCircle(ctx,cx,cy,r,type){
  const grad=ctx.createRadialGradient(cx-r*.25,cy-r*.35,r*.08,cx,cy,r);
  if(type==="P"){grad.addColorStop(0,"#ddd");grad.addColorStop(.55,"#999");grad.addColorStop(1,"#666");}
  else{grad.addColorStop(0,"#fff");grad.addColorStop(.6,"#eee");grad.addColorStop(1,"#ccc");}
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle=grad; ctx.fill();
  ctx.lineWidth=2; ctx.strokeStyle="#222"; ctx.stroke();
  ctx.font=Math.floor(r*.48)+"px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillStyle=type==="P"?"#fff":"#222"; ctx.fillText(type,cx,cy+r*.04);
}
function drawAtom(atom,z,n){
  const canvas=document.getElementById("atomCanvas"), ctx=canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle="white"; ctx.fillRect(0,0,canvas.width,canvas.height);
  const phase=atom.phase, e=ELEMENTS[z], mass=z+n;
  ctx.font="40px Arial"; ctx.textAlign="center"; ctx.textBaseline="top"; ctx.fillStyle=(z===2||z===10||z===18)?"#d22":"#222";
  ctx.fillText(e[0]+"-"+mass,canvas.width/2,12);
  const gridPadX=120, gridPadTop=92;
  const cell=Math.min((canvas.width-gridPadX*2)/phase.cols,(canvas.height-gridPadTop-70)/phase.rows);
  const r=cell/2, offX=(canvas.width-phase.cols*cell)/2, offY=gridPadTop;
  ctx.setLineDash([6,5]); ctx.strokeStyle="#555"; ctx.lineWidth=1.2;
  for(let x=0;x<=phase.cols;x++){ctx.beginPath();ctx.moveTo(offX+x*cell,offY);ctx.lineTo(offX+x*cell,offY+phase.rows*cell);ctx.stroke();}
  for(let y=0;y<=phase.rows;y++){ctx.beginPath();ctx.moveTo(offX,offY+y*cell);ctx.lineTo(offX+phase.cols*cell,offY+y*cell);ctx.stroke();}
  ctx.setLineDash([]);
  const occupied=new Set(atom.particles.map(key));
  for(const v of (atom.template.V||[])){
    if(!occupied.has(keyXY(v[0],v[1]))){
      const vt = fieldTypePhase(v[0],v[1],phase);
      drawVacancy(ctx,offX+v[0]*cell+r,offY+v[1]*cell+r,r,vt);
    }
  }
  for(const p of atom.particles)drawCircle(ctx,offX+p.x*cell+r,offY+p.y*cell+r,r,p.type);
  document.getElementById("atomInfo").innerHTML=
    "<strong>Element:</strong> "+e[1]+" ("+e[0]+")<br>"+
    "<strong>Ordnungszahl:</strong> "+z+"<br>"+
    "<strong>Protonen:</strong> "+z+" &nbsp; <strong>Neutronen:</strong> "+n+"<br>"+
    "<strong>Massenzahl:</strong> "+mass+"<br>"+
    "<strong>Isotop:</strong> "+e[0]+"-"+mass+"<br>"+
    "<strong>Bauphase:</strong> "+phase.description+"<br>"+
    "<strong>Wertigkeiten:</strong> "+
    (atom.template.V||[]).filter(v=>fieldTypePhase(v[0],v[1],phase)==="P").length+
    " gegen Wasserstoff (blau), "+
    (atom.template.V||[]).filter(v=>fieldTypePhase(v[0],v[1],phase)==="N").length+
    " gegen Sauerstoff (rot)<br>"+
    "<strong>Erweiterung:</strong> Ar → Kr / 7×12 ist vorbereitet.";
  lastCanvasReady=true;
}
function generateAtom(){
  const z=parseInt(document.getElementById("protonCount").value,10), n=parseInt(document.getElementById("neutronCount").value,10);
  if(!ELEMENTS[z]){alert("Diese Version unterstützt aktuell Z=1 bis Z=18.");return;}
  try{drawAtom(buildAtom(z,n),z,n);}catch(e){alert(e.message);}
}
function downloadPNG(){
  if(!lastCanvasReady){alert("Bitte zuerst ein Atom erzeugen.");return;}
  const link=document.createElement("a"); link.download="atom_bauplan_argon_v3g.png"; link.href=document.getElementById("atomCanvas").toDataURL("image/png"); link.click();
}
initElements(); generateAtom();
</script>
</body>
</html>
